<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>BEYBLADE X 專業賽事系統 (終極結構辨識版)</title>
    <style>
        /* 全域與基本設定 */
        * { box-sizing: border-box; }
        body { font-family: '微軟正黑體', sans-serif; margin: 30px; background-color: #0a0b10; color: #d8dee9; font-size: 20px; }
        input, select, button { font-family: inherit; }
        h1 { color: #0ff; text-align: center; text-shadow: 0 0 15px rgba(0, 255, 255, 0.8); font-size: 42px; margin-bottom: 30px; }
        h2 { color: #66fcf1; border-bottom: 2px dashed rgba(102, 252, 241, 0.3); padding-bottom: 10px; margin-top: 0; }
        
        /* 模組框與按鈕 */
        .box { background: rgba(15, 18, 25, 0.85); padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 255, 255, 0.2); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        button { color: white; border: 2px solid transparent; padding: 12px 20px; font-size: 18px; cursor: pointer; border-radius: 10px; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: #1f2833; border-color: #45a29e; color: #66fcf1; } .btn-blue:hover { background: #45a29e; color: #000; box-shadow: 0 0 15px #45a29e; }
        .btn-danger { background: #1f2833; border-color: #e74c3c; color: #e74c3c; } .btn-danger:hover { background: #e74c3c; color: #fff; }
        
        /* 動態篩選標籤按鈕 */
        .filter-container { text-align: center; margin-bottom: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .filter-btn { background: #111; border: 2px solid #555; color: #aaa; padding: 8px 18px; border-radius: 20px; font-size: 16px; transition: 0.2s; }
        .filter-btn:hover { border-color: #f1c40f; color: #fff; }
        .filter-btn.active { background: #f1c40f; border-color: #f1c40f; color: #000; box-shadow: 0 0 10px rgba(241,196,15,0.5); font-weight: bold; }

        /* Modal 彈出層設定 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; overflow-y: auto; padding: 25px; backdrop-filter: blur(5px); }
        .modal-content { max-width: 1400px; margin: 0 auto; background: rgba(15, 18, 25, 0.95); padding: 30px; border-radius: 20px; border: 2px solid #0ff; }
        
        /* 牌組總覽 */
        .deck-overview-container { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .deck-card { width: 340px; background: rgba(0,0,0,0.6); border: 2px solid #45a29e; border-radius: 16px; padding: 25px; text-align: center; cursor: pointer; transition: 0.3s; position: relative; }
        .deck-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,255,255,0.3); border-color: #0ff; }
        .deck-img { width: 180px; height: 180px; object-fit: contain; margin: 0 auto 10px auto; display: block; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); }
        .deck-name { font-size: 22px; font-weight: bold; color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.5); margin-top: 15px; }
        .deck-badge { position: absolute; top: 10px; left: 10px; background: #45a29e; color: #000; font-weight: bold; padding: 4px 10px; border-radius: 8px; font-size: 16px; }

        /* 配置編輯器 */
        .editor-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .part-slot { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.5); border: 2px dashed #45a29e; padding: 10px 20px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .part-slot:hover { border-color: #0ff; background: rgba(0,255,255,0.1); }
        .part-label { font-size: 20px; color: #c5c6c7; font-weight: bold; width: 220px; }
        .part-preview { display: flex; align-items: center; gap: 15px; }
        .part-thumb { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8)); }
        .part-val { font-size: 22px; color: #fff; font-weight: bold; width: 250px; text-align: right; }

        /* 視覺化九宮格 */
        .grid-modal { z-index: 1050; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-height: 60vh; overflow-y: auto; padding: 10px; margin-top: 10px; }
        .grid-item { position: relative; background: rgba(255,255,255,0.05); border: 2px solid #555; border-radius: 12px; padding: 15px 10px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: space-between;}
        .grid-item:hover { border-color: #f1c40f; background: rgba(241,196,15,0.1); transform: scale(1.05); }
        .grid-img { width: 120px; height: 120px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)); }
        .grid-title { font-size: 18px; font-weight: bold; color: #fff; word-break: break-all; }
        
        .variant-badge { position: absolute; top: 8px; right: 8px; background: #e74c3c; color: #fff; font-size: 12px; padding: 4px 8px; border-radius: 12px; font-weight: bold; box-shadow: 0 0 10px rgba(231,76,60,0.8); }
        .macro-badge { position: absolute; top: 8px; left: 8px; background: #2ecc71; color: #000; font-size: 12px; padding: 4px 8px; border-radius: 12px; font-weight: bold; box-shadow: 0 0 10px rgba(46,204,113,0.8); }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(69, 162, 158, 0.6); border-radius: 8px; }
        ::-webkit-scrollbar-thumb:hover { background: #66fcf1; }
    </style>
</head>
<body>

    <div class="box">
        <h1>🏆 選手 3on3 牌組兵工廠</h1>
        <div id="dataStatus" style="text-align:center; color:#aaa; margin-top:-20px; margin-bottom:20px;">📡 正在連線讀取零件資料庫 (main_db.json)...</div>
        <div class="deck-overview-container" id="deckOverview"></div>
    </div>

    <div id="editorModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px;">
            <h2>🛠️ 編輯配置 - <span id="currentEditingDeckNum"></span></h2>
            <p style="color: #45a29e; text-align: center;">請先選擇最上方的「核心上蓋」，系統會自動展開所需的零件欄位！</p>
            <div id="editorSlots" class="editor-container"></div>
            <div style="text-align: center; margin-top: 30px;">
                <button class="btn-blue" onclick="saveCurrentDeck()" style="font-size: 24px; padding: 15px 40px;">✅ 確認並返回</button>
            </div>
        </div>
    </div>

    <div id="visualGridModal" class="modal-overlay grid-modal">
        <div class="modal-content">
            <h2 id="gridTitle" style="color: #f1c40f; margin-bottom: 15px;">選擇零件</h2>
            <div class="filter-container" id="systemFilter"></div>
            <div id="gridContainer" class="grid-container"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-danger" onclick="closeVisualGrid()">❌ 取消選擇</button>
            </div>
        </div>
    </div>

    <div id="variantModal" class="modal-overlay grid-modal" style="z-index: 1060;">
        <div class="modal-content" style="max-width: 1000px;">
            <h2 id="variantTitle" style="color: #0ff;">請選擇指定版本</h2>
            <div id="variantContainer" class="grid-container"></div>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-danger" onclick="closeVariantModal()">↩️ 返回上一頁</button>
            </div>
        </div>
    </div>

<script>
// ================== 防斷圖機制 ==================
const FALLBACK_IMG = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='100'><circle cx='50' cy='50' r='45' fill='none' stroke='%23555' stroke-width='4'/><text x='50' y='55' fill='%23888' font-size='16' text-anchor='middle'>無圖片</text></svg>";
window.handleImgError = function(img) {
    if (!img.dataset.triedApp) {
        img.dataset.triedApp = "true";
        img.src = img.src.replace('/site/', '/app/');
    } else if (!img.dataset.triedFallback) {
        img.dataset.triedFallback = "true";
        img.src = FALLBACK_IMG;
    }
};

// ================== 核心資料庫與狀態 ==================
let partsDb = { TopPart: [], Blade: [], MainBlade: [], OverBlade: [], MetalBlade: [], AssistBlade: [], LockChip: [], Ratchet: [], Bit: [] };
const BASE_IMG_URL = "https://beyblade.phstudy.org/images/site/";
let currentDecks = [ { mode: 'standard', parts: {} }, { mode: 'standard', parts: {} }, { mode: 'standard', parts: {} } ];
let editingDeckIndex = -1; 
let selectingPartCategory = ""; 
let currentSelectedPartGroup = null; 
let currentFilterType = "ALL";

// 全局的結構地圖，用來儲存每個 set_id 擁有什麼物理零件
let setStructureMap = {};

window.onload = async function() { await loadDatabase(); renderDeckOverview(); };

// ================== 淨化器 ==================
function cleanPartName(rawName) {
    if (!rawName) return "未命名零件";
    let name = String(rawName);
    
    let cleaned = name.replace(/^(BX|UX|CX|BXG|BXH|BXC|BXR)[a-zA-Z0-9\-]*\s+/ig, ''); 
    
    let suffixes = [
        /(金屬塗層|メタルコート|Metallic Coat)[:：]?\s*[A-Za-z0-9\u4e00-\u9fa5]+/ig,
        /[A-Za-z0-9\u4e00-\u9fa5\s]+(Ver\.|バージョン|版)/ig,
        /(Black|Red|Blue|Gold|Silver|Clear|Cyan|Magenta|Orange|Green|Yellow|Bronze|Navy|White|Violet|限定)\s*(Ver\.)?/ig,
        /中收錄.*$/ig,
        /ランダムブースター.*$/ig,
        /\s*(鋼鐵|金屬|主要|超越|輔助)戰刃/ig,
        /\s*(メタル|メイン|オーバー|アシスト)ブレード/ig
    ];
    suffixes.forEach(regex => { cleaned = cleaned.replace(regex, ''); });
    
    let finalName = cleaned.trim();
    if (finalName === '' || finalName.length <= 1) return name.trim(); 
    return finalName; 
}

// ✨ 物理結構導向：標籤賦予引擎 ✨
function extractTags(item, rawName, setId) {
    let tags = new Set();
    let upperName = String(rawName).toUpperCase();
    let upperId = String(setId).toUpperCase();
    let fullText = upperName + " " + upperId;
    
    // 1. 核心系統判定 (依照 setStructureMap 的物理結構決定！)
    let struct = setStructureMap[setId] || {};
    if (struct.hasMetal || struct.hasMain) {
        // 只要這包產品裡有 MetalBlade 或 MainBlade，全部零件都會被標記為 CX 系統！
        tags.add('CX');
    } else if (struct.hasBlade && (fullText.includes('UX') || item.series === 'UX')) {
        tags.add('UX');
    } else if (struct.hasBlade) {
        tags.add('BX'); 
    }
    
    // 2. 復刻 / 聯名
    if (fullText.includes('BXG') || upperName.includes('復刻') || upperName.includes('聯名') || fullText.includes('CROSSOVER')) tags.add('BXG');
    
    // 3. 賽事 / EVE
    if (fullText.includes('BXC') || fullText.includes('EVE') || fullText.includes('BXR') || fullText.includes('BXH') || upperName.includes('G1') || upperName.includes('G2') || upperName.includes('G3') || upperName.includes('大賽') || upperName.includes('CUP')) tags.add('EVE');
    
    // 4. 限定版 / 機密 (不含抽包)
    if (fullText.includes('LIMITED') || upperName.includes('限定') || upperName.includes('非売品') || fullText.includes('PRD')) tags.add('LIMITED');
    
    // 5. 隨機抽包
    if (fullText.includes('ランダム') || upperName.includes('RANDOM') || upperName.includes('抽包') || upperName.includes('隨機')) tags.add('RANDOM');
    
    // Fallback
    if (!tags.has('BX') && !tags.has('UX') && !tags.has('CX')) tags.add('BX'); 
    
    return Array.from(tags);
}

// ================== 資料庫解析 (兩階段讀取法 Two-Pass Parsing) ==================
async function loadDatabase() {
    const statusDiv = document.getElementById('dataStatus');
    try {
        const res = await fetch('main_db.json');
        const mainData = await res.json();
        const categoryMap = { 'BeybladePartsBlade': 'Blade', 'BeybladePartsMainBlade': 'MainBlade', 'BeybladePartsOverBlade': 'OverBlade', 'BeybladePartsMetalBlade': 'MetalBlade', 'BeybladePartsAssistBlade': 'AssistBlade', 'BeybladePartsLockChip': 'LockChip', 'BeybladePartsRatchet': 'Ratchet', 'BeybladePartsBit': 'Bit' };

        // 🟢 【第一階段】建立結構地圖 (Mapping)
        for (const [rawCat, obj] of Object.entries(mainData.data)) {
            let shortCat = categoryMap[rawCat];
            if (!shortCat) continue;
            
            for (const [id, item] of Object.entries(obj)) {
                // 如果沒有 set_id，用產品編號前綴當作 fallback
                let fallbackSetId = id.includes('-') ? id.split('-').slice(0,2).join('-') : id;
                let setId = item.base_set_id || item.set_id || fallbackSetId;
                
                if (!setStructureMap[setId]) {
                    setStructureMap[setId] = { hasMetal: false, hasMain: false, hasBlade: false };
                }
                if (shortCat === 'MetalBlade') setStructureMap[setId].hasMetal = true;
                if (shortCat === 'MainBlade') setStructureMap[setId].hasMain = true;
                if (shortCat === 'Blade') setStructureMap[setId].hasBlade = true;
            }
        }

        // 🟢 【第二階段】正式解析零件與賦予標籤
        for (const [rawCat, obj] of Object.entries(mainData.data)) {
            let shortCat = categoryMap[rawCat];
            if (!shortCat) continue;
            
            for (const [id, item] of Object.entries(obj)) {
                let getName = (nameObj) => {
                    if (!nameObj) return null;
                    if (typeof nameObj === 'string') return nameObj;
                    return nameObj['zh-TW'] || nameObj['ja-JP'] || nameObj['en-US'] || nameObj['en-SG'] || nameObj.en_name || null;
                };
                
                let rawNameTW = getName(item.name) || getName(item.catalog_title) || "";
                
                let fallbackSetId = id.includes('-') ? id.split('-').slice(0,2).join('-') : id;
                let setId = item.base_set_id || item.set_id || fallbackSetId;
                
                if (rawNameTW === "■" || rawNameTW.trim() === "") {
                    rawNameTW = `${setId} (機密/特殊聯名)`;
                }
                
                let cleanName = cleanPartName(rawNameTW);
                let hasColorWord = /(Metallic Coat|メタルコート|Ver\.|Black|Red|Blue|Gold|Silver|Clear|Cyan|Magenta|Orange|Green|Yellow|Bronze|Navy|White|Violet|限定)/i.test(rawNameTW);
                
                // 傳入 setId，讓引擎依照物理結構賦予標籤
                let variantTags = extractTags(item, rawNameTW, setId);

                // 屬性戰術分析
                let bitType = 'Balance';
                if (shortCat === 'Bit') {
                    let st = item.defaultStatus || {};
                    let a = (st.attack || 0) + (st.dash || 0);
                    let d = st.defense || 0;
                    let s = st.stamina || 0;
                    let max = Math.max(a, d, s);
                    if (max > 0) {
                        if (max === a && a > d && a > s) bitType = 'Attack';
                        else if (max === d && d > a && d > s) bitType = 'Defense';
                        else if (max === s && s > a && s > d) bitType = 'Stamina';
                    }
                }

                let variantObj = {
                    id: id, rawName: rawNameTW, image: `${BASE_IMG_URL}${shortCat}/${id}.png`,
                    category: shortCat, hasColorWord: hasColorWord, set_id: setId, tags: variantTags, bitType: bitType
                };

                let existingPart = partsDb[shortCat].find(p => p.clean_name === cleanName);
                if (existingPart) {
                    existingPart.variants.push(variantObj);
                    variantTags.forEach(t => { if(!existingPart.tags.includes(t)) existingPart.tags.push(t); });
                } else {
                    partsDb[shortCat].push({ clean_name: cleanName, category: shortCat, tags: [...variantTags], bitType: bitType, variants: [variantObj] });
                }
            }
        }
        
        Object.values(partsDb).forEach(catList => {
            catList.forEach(group => { group.variants.sort((a, b) => a.hasColorWord === b.hasColorWord ? 0 : (a.hasColorWord ? 1 : -1)); });
        });

        if (partsDb['Ratchet']) {
            let parseRatchet = (name) => {
                let match = name.match(/(\d+)-(50|60|70|80|X5|85)/i);
                if (!match) return { points: 99, height: 999 }; 
                let pts = parseInt(match[1]);
                let htStr = match[2].toUpperCase();
                let ht = htStr === 'X5' ? 85 : parseInt(htStr);
                return { points: pts, height: ht };
            };
            partsDb['Ratchet'].sort((a, b) => {
                let pA = parseRatchet(a.clean_name);
                let pB = parseRatchet(b.clean_name);
                if (pA.height !== pB.height) return pA.height - pB.height;
                return pA.points - pB.points; 
            });
        }

        // 大一統上蓋庫 (涵蓋 BX, UX, CX)
        partsDb.TopPart = [...partsDb.Blade, ...partsDb.MainBlade, ...partsDb.MetalBlade];
        statusDiv.innerHTML = `<span style="color:#2ecc71;">✅ 系統就緒！(已實裝 物理結構解析引擎 Two-Pass Parsing)</span>`;
    } catch (e) { console.error(e); statusDiv.innerHTML = `<span style="color:#e74c3c;">❌ 無法讀取 main_db.json</span>`; }
}

// ================== 牌組總覽 ==================
function renderDeckOverview() {
    const container = document.getElementById('deckOverview');
    container.innerHTML = '';
    currentDecks.forEach((deck, index) => {
        let fullName = getDeckFullName(deck);
        let coverImg = deck.parts.TopPart ? deck.parts.TopPart.image : FALLBACK_IMG;
        container.innerHTML += `
            <div class="deck-card" onclick="openEditor(${index})">
                <div class="deck-badge">陀螺 ${index + 1}</div>
                <img src="${coverImg}" class="deck-img" onerror="handleImgError(this)">
                <div class="deck-name">${fullName}</div>
            </div>`;
    });
}

function getDeckFullName(deck) {
    let top = deck.parts.TopPart;
    if (!top) return "點擊進行配置";

    let isIntegratedBlade = top && /彈丸獅鷲|Aero Pegasus|UX-19/i.test(top.clean_name);
    let isIntegratedBit = deck.parts.Bit && /^(Op|Tr|Elevate|Trick)/i.test(deck.parts.Bit.clean_name);
    
    let ratchetName = deck.parts.Ratchet ? deck.parts.Ratchet.clean_name : "";
    if (isIntegratedBlade || isIntegratedBit || ratchetName.includes("一體式") || deck.parts.Ratchet?.id.startsWith('INT-')) {
        ratchetName = ""; 
    }
    
    let bitName = deck.parts.Bit ? deck.parts.Bit.clean_name : "";
    let rbSuffix = (ratchetName || bitName) ? ` ${ratchetName}${bitName}` : "";

    let name = "";
    if (deck.mode === 'standard') {
        name = top.clean_name + rbSuffix;
    } else if (deck.mode === 'cx1') {
        let lock = deck.parts.LockChip ? deck.parts.LockChip.clean_name : "";
        let assist = deck.parts.AssistBlade ? deck.parts.AssistBlade.clean_name : "";
        name = `${lock}${top.clean_name}${assist}${rbSuffix}`;
    } else if (deck.mode === 'cx2') {
        let lock = deck.parts.LockChip ? deck.parts.LockChip.clean_name : "";
        let over = deck.parts.OverBlade ? deck.parts.OverBlade.clean_name : "";
        let assist = deck.parts.AssistBlade ? deck.parts.AssistBlade.clean_name : "";
        name = `${lock}${top.clean_name}${over}${assist}${rbSuffix}`;
    }
    return name.trim();
}

// ================== 動態插槽編輯器 (完美精準判定模式) ==================
function openEditor(index) {
    editingDeckIndex = index;
    document.getElementById('currentEditingDeckNum').innerText = `陀螺 ${index + 1}`;
    renderEditorSlots();
    document.getElementById('editorModal').style.display = 'block';
}

function renderEditorSlots() {
    let deck = currentDecks[editingDeckIndex];
    let topPart = deck.parts.TopPart;
    
    deck.mode = 'standard';
    if (topPart) {
        // ✨ 因為採用了結構地圖判定，這裡依據真實所選零件分類精準展開 CX 插槽 ✨
        if (topPart.category === 'MainBlade') deck.mode = 'cx1';
        else if (topPart.category === 'MetalBlade') deck.mode = 'cx2';
    }

    let slotsHtml = "";
    const createSlot = (category, label) => {
        let part = deck.parts[category];
        let img = part ? part.image : FALLBACK_IMG;
        let txt = part ? part.clean_name : "請選擇配件";
        let color = part ? "#fff" : "#aaa";
        return `
            <div class="part-slot" onclick="openVisualGrid('${category}', '${label}')">
                <div class="part-label">${label}</div>
                <div class="part-preview">
                    <div class="part-val" style="color: ${color};">${txt}</div>
                    <img src="${img}" class="part-thumb" onerror="handleImgError(this)">
                </div>
            </div>`;
    };

    slotsHtml += createSlot('TopPart', '🎯 核心上蓋 (BX/UX/CX)');
    
    if (deck.mode === 'cx1') {
        slotsHtml += createSlot('LockChip', '紋章 (Lock Chip)');
        slotsHtml += createSlot('AssistBlade', '輔助戰刃 (Assist)');
    } else if (deck.mode === 'cx2') {
        slotsHtml += createSlot('LockChip', '紋章 (Lock Chip)');
        slotsHtml += createSlot('OverBlade', '超越戰刃 (Over)');
        slotsHtml += createSlot('AssistBlade', '輔助戰刃 (Assist)');
    }

    let isIntegratedBlade = topPart && /彈丸獅鷲|Aero Pegasus|UX-19/i.test(topPart.clean_name);
    let isIntegratedBit = deck.parts.Bit && /^(Op|Tr|Elevate|Trick)/i.test(deck.parts.Bit.clean_name);

    if (isIntegratedBlade) {
        slotsHtml += `
            <div class="part-slot" onclick="openVisualGrid('TopPart', '🎯 核心上蓋 (BX/UX/CX)')" style="border-color: #f1c40f; background: rgba(241,196,15,0.1);">
                <div class="part-label" style="color: #f1c40f;">固鎖 (Ratchet)</div>
                <div class="part-preview">
                    <div class="part-val" style="color: #f1c40f; font-size:16px;">[上蓋佔用] 點此更換上蓋即可解鎖</div>
                    <img src="${FALLBACK_IMG}" class="part-thumb">
                </div>
            </div>`;
    } else if (isIntegratedBit) {
        slotsHtml += `
            <div class="part-slot" onclick="openVisualGrid('Bit', '軸心 (Bit)')" style="border-color: #f1c40f; background: rgba(241,196,15,0.1);">
                <div class="part-label" style="color: #f1c40f;">固鎖 (Ratchet)</div>
                <div class="part-preview">
                    <div class="part-val" style="color: #f1c40f; font-size:16px;">[軸心佔用] 點此可直接更換下方軸心</div>
                    <img src="${FALLBACK_IMG}" class="part-thumb">
                </div>
            </div>`;
    } else {
        slotsHtml += createSlot('Ratchet', '固鎖 (Ratchet)');
    }
    
    slotsHtml += createSlot('Bit', '軸心 (Bit)');

    document.getElementById('editorSlots').innerHTML = slotsHtml;
}

function saveCurrentDeck() {
    document.getElementById('editorModal').style.display = 'none';
    renderDeckOverview();
}

// ================== 視覺化主圖鑑與智慧篩選器 ==================
function openVisualGrid(category, label) {
    selectingPartCategory = category;
    document.getElementById('gridTitle').innerText = `請選擇 ${label}`;
    
    let filterHtml = '';
    if (category === 'Ratchet') {
        filterHtml = ''; 
    } else if (category === 'Bit') {
        filterHtml = `
            <button class="filter-btn active" onclick="applyFilter('ALL')">全部</button>
            <button class="filter-btn" onclick="applyFilter('Attack')">攻擊型</button>
            <button class="filter-btn" onclick="applyFilter('Defense')">防禦型</button>
            <button class="filter-btn" onclick="applyFilter('Stamina')">持久型</button>
            <button class="filter-btn" onclick="applyFilter('Balance')">平衡型</button>`;
    } else {
        filterHtml = `
            <button class="filter-btn active" onclick="applyFilter('ALL')">全部</button>
            <button class="filter-btn" onclick="applyFilter('BX')">BX</button>
            <button class="filter-btn" onclick="applyFilter('UX')">UX</button>
            <button class="filter-btn" onclick="applyFilter('CX')">CX</button>
            <button class="filter-btn" onclick="applyFilter('BXG')">復刻/BXG</button>
            <button class="filter-btn" onclick="applyFilter('EVE')">比賽/EVE</button>
            <button class="filter-btn" onclick="applyFilter('LIMITED')">限定/機密</button>
            <button class="filter-btn" onclick="applyFilter('RANDOM')">隨機抽包</button>`;
    }
    document.getElementById('systemFilter').innerHTML = filterHtml;

    applyFilter('ALL'); 
    document.getElementById('visualGridModal').style.display = 'block';
}

function applyFilter(filterType) {
    currentFilterType = filterType;
    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    if(event && event.target.classList.contains('filter-btn')) event.target.classList.add('active');
    
    const container = document.getElementById('gridContainer');
    container.innerHTML = '';
    
    let partsList = partsDb[selectingPartCategory] || [];
    
    if (selectingPartCategory === 'Ratchet') {
        partsList = partsList.filter(g => !g.clean_name.includes('一體式'));
    }

    if (currentFilterType !== 'ALL') {
        if (selectingPartCategory === 'Bit') {
            partsList = partsList.filter(g => g.bitType === currentFilterType);
        } else {
            partsList = partsList.filter(g => g.tags.includes(currentFilterType));
        }
    }
    
    if (partsList.length === 0) {
        container.innerHTML = `<h3 style="color:#e74c3c; width:100%;">此篩選條件下無零件資料。</h3>`;
    } else {
        partsList.forEach((partGroup, index) => {
            let thumb = partGroup.variants[0].image;
            let variantBadge = partGroup.variants.length > 1 ? `<div class="variant-badge">${partGroup.variants.length} 種版本</div>` : "";
            
            let isCXMacro = selectingPartCategory === 'TopPart' && partGroup.tags.includes('CX') && (partGroup.category === 'MetalBlade' || partGroup.category === 'MainBlade');
            let macroBadge = isCXMacro ? `<div class="macro-badge">⚡ 一鍵套裝</div>` : "";
            
            let titleSuffix = "";
            if (selectingPartCategory === 'TopPart') {
                if (partGroup.category === 'MetalBlade') titleSuffix = ' <span style="font-size:12px;color:#f1c40f;">[超越-鋼鐵]</span>';
                if (partGroup.category === 'MainBlade') titleSuffix = ' <span style="font-size:12px;color:#2ecc71;">[一般-主要]</span>';
            }
            
            let realIndex = partsDb[selectingPartCategory].indexOf(partGroup);

            container.innerHTML += `
                <div class="grid-item" onclick="handleGroupClick(${realIndex})">
                    ${macroBadge} ${variantBadge}
                    <img src="${thumb}" class="grid-img" loading="lazy" onerror="handleImgError(this)">
                    <div class="grid-title">${partGroup.clean_name}${titleSuffix}</div>
                </div>`;
        });
    }
}

function closeVisualGrid() { document.getElementById('visualGridModal').style.display = 'none'; }
function handleGroupClick(groupIndex) {
    let partGroup = partsDb[selectingPartCategory][groupIndex];
    if (partGroup.variants.length === 1) applyVariant(partGroup.variants[0], partGroup.clean_name);
    else openVariantModal(partGroup);
}

// ================== 版本選擇器 ==================
function openVariantModal(partGroup) {
    currentSelectedPartGroup = partGroup;
    
    let titleSuffix = "";
    if (partGroup.category === 'MetalBlade') titleSuffix = ' [鋼鐵戰刃]';
    if (partGroup.category === 'MainBlade') titleSuffix = ' [主要戰刃]';
    document.getElementById('variantTitle').innerText = `請選擇你要的「${partGroup.clean_name}${titleSuffix}」`;
    
    const container = document.getElementById('variantContainer');
    container.innerHTML = '';
    
    partGroup.variants.forEach((variant, vIndex) => {
        let displayRawName = variant.rawName.replace(/\s*(鋼鐵|金屬|主要|超越|輔助)戰刃|(メタル|メイン|オーバー|アシスト)ブレード/ig, '').trim();
        
        container.innerHTML += `
            <div class="grid-item" onclick="applyVariantByIndex(${vIndex})">
                <img src="${variant.image}" class="grid-img" loading="lazy" onerror="handleImgError(this)">
                <div class="grid-title" style="font-size:14px; color:#aaa; margin-bottom: 5px;">[來源: ${variant.set_id}]</div>
                <div class="grid-title" style="font-size:16px;">${displayRawName}</div>
            </div>`;
    });
    document.getElementById('variantModal').style.display = 'block';
}

function applyVariantByIndex(vIndex) {
    applyVariant(currentSelectedPartGroup.variants[vIndex], currentSelectedPartGroup.clean_name);
}

function findPartByExactPrefixOrSetId(category, targetVariant) {
    if (!targetVariant) return null;
    let setId = targetVariant.set_id;

    let partsInSet = [];
    for (let group of partsDb[category] || []) {
        for (let v of group.variants) {
            if (v.set_id === setId) {
                partsInSet.push({ id: v.id, clean_name: group.clean_name, image: v.image, rawName: v.rawName, category: v.category });
            }
        }
    }
    if (partsInSet.length === 0) return null;

    let subIdMatch = targetVariant.rawName.match(/-\d{2}/) || targetVariant.id.match(/-\d{2}$/);
    if (subIdMatch) {
        let subId = subIdMatch[0];
        let exactMatch = partsInSet.find(p => p.rawName.includes(subId) || p.id.endsWith(subId));
        if (exactMatch) return exactMatch;
    }
    
    return partsInSet[0]; 
}

function getIntegratedDummy(type) {
    return {
        id: "INT-" + type.toUpperCase(),
        clean_name: type === 'blade' ? "一體式戰刃" : "一體式軸心",
        image: FALLBACK_IMG,
        rawName: type === 'blade' ? "[佔用] 隨戰刃綁定" : "[佔用] 隨軸心綁定",
        category: "Ratchet"
    };
}

function applyVariant(variant, cleanName) {
    let finalPart = { id: variant.id, clean_name: cleanName, image: variant.image, rawName: variant.rawName, category: variant.category };
    let deck = currentDecks[editingDeckIndex];

    let isCXSystemPart = selectingPartCategory === 'TopPart' && variant.tags.includes('CX') && (variant.category === 'MetalBlade' || variant.category === 'MainBlade');

    if (isCXSystemPart) {
        let lock = findPartByExactPrefixOrSetId('LockChip', variant);
        let metal = findPartByExactPrefixOrSetId('MetalBlade', variant);
        let over = findPartByExactPrefixOrSetId('OverBlade', variant);
        let main = findPartByExactPrefixOrSetId('MainBlade', variant);
        let assist = findPartByExactPrefixOrSetId('AssistBlade', variant);

        if (metal || variant.category === 'MetalBlade') { 
            deck.parts['TopPart'] = metal || finalPart; 
            deck.parts['LockChip'] = lock; 
            deck.parts['OverBlade'] = over; 
            deck.parts['AssistBlade'] = assist;
        } else if (main || variant.category === 'MainBlade') { 
            deck.parts['TopPart'] = main || finalPart; 
            deck.parts['LockChip'] = lock; 
            deck.parts['AssistBlade'] = assist;
        } else {
            deck.parts['TopPart'] = finalPart; 
        }
    } else {
        deck.parts[selectingPartCategory] = finalPart;
    }

    if (selectingPartCategory === 'TopPart') {
        let isIntegratedBlade = /彈丸獅鷲|Aero Pegasus|UX-19/i.test(finalPart.clean_name);
        if (isIntegratedBlade) {
            deck.parts.Ratchet = getIntegratedDummy('blade');
        } else if (deck.parts.Ratchet && deck.parts.Ratchet.id.startsWith('INT-BLADE')) {
            deck.parts.Ratchet = null; 
        }
    }

    if (selectingPartCategory === 'Bit') {
        let isIntegratedBit = /^(Op|Tr|Elevate|Trick)/i.test(finalPart.clean_name);
        if (isIntegratedBit) {
            deck.parts.Ratchet = getIntegratedDummy('bit');
        } else if (deck.parts.Ratchet && deck.parts.Ratchet.id.startsWith('INT-BIT')) {
            deck.parts.Ratchet = null; 
        }
    }

    closeVariantModal();
    closeVisualGrid();
    renderEditorSlots(); 
}
function closeVariantModal() { document.getElementById('variantModal').style.display = 'none'; }
</script>
